<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: white;
            overflow-x: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 300px;
            background: #2a2a2a;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #404040;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
            background: #1a1a1a;
        }
        
        .stock-header {
            margin-bottom: 30px;
        }
        
        .stock-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
            opacity: 0.8;
        }
        
        .stock-price {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 10px;
        }
        
        .stock-change {
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .positive { color: #00d4aa; }
        .negative { color: #ff4757; }
        
        .chart-container {
            position: relative;
            height: 400px;
            background: #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .time-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .time-btn {
            background: #404040;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .time-btn.active {
            background: #0066cc;
        }
        
        .time-btn:hover {
            background: #505050;
        }
        
        .time-btn.active:hover {
            background: #0066cc;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 12px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #404040;
        }
        
        .stat-item:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            opacity: 0.7;
            font-size: 14px;
        }
        
        .stat-value {
            font-weight: 500;
            font-size: 14px;
        }
        
        .add-stock {
            margin-bottom: 20px;
        }
        
        .add-stock input {
            width: 100%;
            background: #404040;
            border: 1px solid #505050;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .add-stock button {
            width: 100%;
            background: #0066cc;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        .add-stock button:hover {
            background: #0052a3;
        }
        
        .folder {
            margin-bottom: 20px;
            background: #333;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .folder-header {
            background: #404040;
            padding: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
        }
        
        .folder-content {
            min-height: 50px;
            padding: 10px;
            border: 2px dashed transparent;
            transition: all 0.2s;
        }
        
        .folder-content.drag-over {
            border-color: #0066cc;
            background: rgba(0, 102, 204, 0.1);
        }
        
        .stock-item {
            background: #2a2a2a;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: grab;
            transition: all 0.2s;
            border-left: 3px solid #404040;
        }
        
        .stock-item:hover {
            background: #333;
            transform: translateX(2px);
        }
        
        .stock-item.active {
            border-left-color: #0066cc;
            background: #333;
        }
        
        .stock-item.dragging {
            opacity: 0.5;
            transform: rotate(5deg);
        }
        
        .stock-symbol {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .stock-price-small {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            font-size: 18px;
            opacity: 0.7;
        }
        
        .error {
            color: #ff4757;
            text-align: center;
            padding: 20px;
            background: rgba(255, 71, 87, 0.1);
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .new-folder-btn {
            width: 100%;
            background: #28a745;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .new-folder-btn:hover {
            background: #218838;
        }
        
        .delete-btn {
            background: #dc3545;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .delete-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="add-stock">
                <input type="text" id="stockInput" placeholder="Enter stock symbol (e.g., AAPL)" />
                <button onclick="addStock()">Add Stock</button>
            </div>
            
            <button class="new-folder-btn" onclick="createFolder()">+ New Folder</button>
            
            <div id="folders"></div>
        </div>
        
        <div class="main-content">
            <div class="stock-header">
                <div class="stock-title" id="stockTitle">Select a stock</div>
                <div class="stock-price" id="stockPrice">--</div>
                <div class="stock-change" id="stockChange">--</div>
            </div>
            
            <div class="time-buttons">
                <button class="time-btn active" data-period="1D" onclick="changePeriod('1D', this)">1D</button>
                <button class="time-btn" data-period="5D" onclick="changePeriod('5D', this)">5D</button>
                <button class="time-btn" data-period="1M" onclick="changePeriod('1M', this)">1M</button>
                <button class="time-btn" data-period="6M" onclick="changePeriod('6M', this)">6M</button>
                <button class="time-btn" data-period="YTD" onclick="changePeriod('YTD', this)">YTD</button>
                <button class="time-btn" data-period="1Y" onclick="changePeriod('1Y', this)">1Y</button>
                <button class="time-btn" data-period="5Y" onclick="changePeriod('5Y', this)">5Y</button>
                <button class="time-btn" data-period="MAX" onclick="changePeriod('MAX', this)">MAX</button>
            </div>
            
            <div class="chart-container">
                <canvas id="stockChart"></canvas>
            </div>
            
            <div class="stats-grid" id="statsGrid">
                <div class="stat-item">
                    <span class="stat-label">Open</span>
                    <span class="stat-value" id="openPrice">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Volume</span>
                    <span class="stat-value" id="volume">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Market Cap</span>
                    <span class="stat-value" id="marketCap">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Day High</span>
                    <span class="stat-value" id="dayHigh">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Day Low</span>
                    <span class="stat-value" id="dayLow">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">52W High</span>
                    <span class="stat-value" id="yearHigh">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">52W Low</span>
                    <span class="stat-value" id="yearLow">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">P/E Ratio</span>
                    <span class="stat-value" id="peRatio">--</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chart;
        let currentStock = null;
        let currentPeriod = '1D';
        let stocks = JSON.parse(localStorage.getItem('stocks')) || {};
        let folders = JSON.parse(localStorage.getItem('folders')) || [
            { id: 'watchlist', name: 'Watchlist', stocks: ['AAPL'] },
            { id: 'portfolio', name: 'Portfolio', stocks: [] }
        ];

        // Initialize with default stocks
        if (Object.keys(stocks).length === 0) {
            stocks = {
                'AAPL': { symbol: 'AAPL', price: 201.70, change: -40.95, changePercent: -16.88 }
            };
            saveData();
        }

        function saveData() {
            localStorage.setItem('stocks', JSON.stringify(stocks));
            localStorage.setItem('folders', JSON.stringify(folders));
        }

        function generateMockData(symbol, period) {
            const periods = {
                '1D': 24,
                '5D': 120,
                '1M': 30,
                '6M': 180,
                'YTD': 150,
                '1Y': 365,
                '5Y': 1825,
                'MAX': 3650
            };
            
            const points = periods[period] || 365;
            const basePrice = stocks[symbol]?.price || 100;
            const data = [];
            const labels = [];
            
            for (let i = points; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                
                const variation = (Math.random() - 0.5) * 10;
                const price = Math.max(basePrice + variation * (i / points), basePrice * 0.5);
                
                data.push(price.toFixed(2));
                labels.push(date.toISOString().split('T')[0]);
            }
            
            return { labels, data };
        }

        async function fetchStockData(symbol) {
            // Simulate API call with realistic mock data
            return new Promise((resolve) => {
                setTimeout(() => {
                    const mockData = {
                        symbol: symbol,
                        price: (Math.random() * 500 + 50).toFixed(2),
                        change: (Math.random() * 20 - 10).toFixed(2),
                        changePercent: (Math.random() * 10 - 5).toFixed(2),
                        open: (Math.random() * 500 + 50).toFixed(2),
                        volume: Math.floor(Math.random() * 100000000).toLocaleString(),
                        marketCap: (Math.random() * 2000 + 100).toFixed(1) + 'B',
                        dayHigh: (Math.random() * 500 + 50).toFixed(2),
                        dayLow: (Math.random() * 500 + 50).toFixed(2),
                        yearHigh: (Math.random() * 600 + 100).toFixed(2),
                        yearLow: (Math.random() * 200 + 20).toFixed(2),
                        peRatio: (Math.random() * 50 + 5).toFixed(2)
                    };
                    resolve(mockData);
                }, 500);
            });
        }

        async function addStock() {
            const input = document.getElementById('stockInput');
            const symbol = input.value.trim().toUpperCase();
            
            if (!symbol) return;
            
            if (stocks[symbol]) {
                alert('Stock already added!');
                return;
            }
            
            try {
                document.getElementById('stockTitle').textContent = 'Loading...';
                const data = await fetchStockData(symbol);
                
                stocks[symbol] = {
                    symbol: data.symbol,
                    price: parseFloat(data.price),
                    change: parseFloat(data.change),
                    changePercent: parseFloat(data.changePercent),
                    data: data
                };
                
                // Add to first folder
                if (folders.length > 0) {
                    folders[0].stocks.push(symbol);
                }
                
                saveData();
                renderFolders();
                input.value = '';
                
                // Auto-select the new stock
                selectStock(symbol);
            } catch (error) {
                alert('Error fetching stock data. Please try again.');
            }
        }

        function selectStock(symbol) {
            currentStock = symbol;
            const stock = stocks[symbol];
            
            if (!stock) return;
            
            // Update header
            document.getElementById('stockTitle').textContent = `${stock.symbol}`;
            document.getElementById('stockPrice').textContent = `$${stock.price.toFixed(2)}`;
            
            const changeClass = stock.change >= 0 ? 'positive' : 'negative';
            const changeSign = stock.change >= 0 ? '+' : '';
            document.getElementById('stockChange').innerHTML = 
                `<span class="${changeClass}">${changeSign}${stock.change.toFixed(2)} (${changeSign}${stock.changePercent.toFixed(2)}%)</span>`;
            
            // Update stats
            if (stock.data) {
                document.getElementById('openPrice').textContent = `$${stock.data.open}`;
                document.getElementById('volume').textContent = stock.data.volume;
                document.getElementById('marketCap').textContent = `$${stock.data.marketCap}`;
                document.getElementById('dayHigh').textContent = `$${stock.data.dayHigh}`;
                document.getElementById('dayLow').textContent = `$${stock.data.dayLow}`;
                document.getElementById('yearHigh').textContent = `$${stock.data.yearHigh}`;
                document.getElementById('yearLow').textContent = `$${stock.data.yearLow}`;
                document.getElementById('peRatio').textContent = stock.data.peRatio;
            }
            
            // Update active state
            document.querySelectorAll('.stock-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`[data-symbol="${symbol}"]`)?.classList.add('active');
            
            updateChart();
        }

        function updateChart() {
            if (!currentStock) return;
            
            const mockData = generateMockData(currentStock, currentPeriod);
            const stock = stocks[currentStock];
            const isPositive = stock.change >= 0;
            
            const ctx = document.getElementById('stockChart').getContext('2d');
            
            if (chart) {
                chart.destroy();
            }
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: mockData.labels,
                    datasets: [{
                        data: mockData.data,
                        borderColor: isPositive ? '#00d4aa' : '#ff4757',
                        backgroundColor: isPositive ? 
                            'rgba(0, 212, 170, 0.1)' : 'rgba(255, 71, 87, 0.1)',
                        fill: true,
                        borderWidth: 2,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: '#2a2a2a',
                            titleColor: 'white',
                            bodyColor: 'white',
                            borderColor: '#404040',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        x: {
                            display: false,
                            grid: { display: false }
                        },
                        y: {
                            display: false,
                            grid: { display: false }
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    }
                }
            });
        }

        function changePeriod(period, button) {
            currentPeriod = period;
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            updateChart();
        }

        function createFolder() {
            const name = prompt('Enter folder name:');
            if (name && name.trim()) {
                const id = 'folder_' + Date.now();
                folders.push({ id, name: name.trim(), stocks: [] });
                saveData();
                renderFolders();
            }
        }

        function deleteFolder(folderId) {
            if (confirm('Are you sure you want to delete this folder?')) {
                const folderIndex = folders.findIndex(f => f.id === folderId);
                if (folderIndex > -1) {
                    folders.splice(folderIndex, 1);
                    saveData();
                    renderFolders();
                }
            }
        }

        function renderFolders() {
            const container = document.getElementById('folders');
            container.innerHTML = '';
            
            folders.forEach(folder => {
                const folderDiv = document.createElement('div');
                folderDiv.className = 'folder';
                folderDiv.innerHTML = `
                    <div class="folder-header">
                        <span>${folder.name}</span>
                        <button class="delete-btn" onclick="deleteFolder('${folder.id}')">×</button>
                    </div>
                    <div class="folder-content" ondrop="drop(event, '${folder.id}')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                        ${folder.stocks.map(symbol => {
                            const stock = stocks[symbol];
                            if (!stock) return '';
                            const changeClass = stock.change >= 0 ? 'positive' : 'negative';
                            const changeSign = stock.change >= 0 ? '+' : '';
                            return `
                                <div class="stock-item" data-symbol="${symbol}" draggable="true" ondragstart="drag(event)" onclick="selectStock('${symbol}')">
                                    <div class="stock-symbol">${symbol}</div>
                                    <div class="stock-price-small">
                                        $${stock.price.toFixed(2)} 
                                        <span class="${changeClass}">${changeSign}${stock.changePercent.toFixed(2)}%</span>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(folderDiv);
            });
        }

        function allowDrop(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.add('drag-over');
        }

        function dragLeave(ev) {
            ev.currentTarget.classList.remove('drag-over');
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.dataset.symbol);
            ev.target.classList.add('dragging');
        }

        function drop(ev, folderId) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            
            const symbol = ev.dataTransfer.getData("text");
            const sourceFolder = folders.find(f => f.stocks.includes(symbol));
            const targetFolder = folders.find(f => f.id === folderId);
            
            if (sourceFolder && targetFolder && sourceFolder.id !== targetFolder.id) {
                // Remove from source
                sourceFolder.stocks = sourceFolder.stocks.filter(s => s !== symbol);
                // Add to target if not already there
                if (!targetFolder.stocks.includes(symbol)) {
                    targetFolder.stocks.push(symbol);
                }
                saveData();
                renderFolders();
            }
            
            document.querySelector('.dragging')?.classList.remove('dragging');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderFolders();
            
            // Select first stock if available
            const firstStock = Object.keys(stocks)[0];
            if (firstStock) {
                selectStock(firstStock);
            }
            
            // Enter key support
            document.getElementById('stockInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addStock();
                }
            });
        });
    </script>
</body>
</html>
